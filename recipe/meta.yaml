{% set name = "mistralai" %}
{% set version = "2.5.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 2c1c2ac8cc3b6c8789f2a4e47235bb5491485051d751b352dfc34c8f192ec35a

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<310]

requirements:
  host:
    - pip
    - python
    - hatchling
  run:
    - python
    - eval-type-backport >=0.2.0
    - httpx >=0.28.1
    - pydantic >=2.11.2
    - python-dateutil >=2.8.2
    - typing-inspection >=0.4.0
    - opentelemetry-api >=1.33.1,<2.0.0
    - opentelemetry-semantic-conventions >=0.60b1,<0.61
    - jsonpath-python >=1.0.6
  run_constrained:
    # gcp
    - google-auth >=2.27.0
    - requests >=2.32.3
    # agents
    - mcp >=1.0,<2.0  # [py>=310]
    - griffe >=1.7.3,<2.0
    - authlib >=1.5.2,<2.0
    # realtime
    - websockets >=13.0
    # telemetry
    - opentelemetry-sdk >=1.33.1,<2.0.0
    - opentelemetry-exporter-otlp-proto-http >=1.33.1,<2.0.0


test:
  imports:
    - mistralai
    - mistralai.client
  requires:
    - pip
  commands:
    - pip check
    # There are no tests in the source code,
    # except upstream tests in https://github.com/mistralai/client-python/tree/main/src/mistralai/extra/tests
    # but they have relative imports, so we can't run them here.

about:
  home: https://github.com/mistralai/client-python
  summary: Python client library for Mistral AI platform
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  description: |
    Mistral AI is a leading open-source generative AI platform.
    This is the official Python client library for Mistral AI,
    which provides a simple and efficient way to interact with
    the Mistral API.
  doc_url: https://github.com/mistralai/client-python
  dev_url: https://github.com/mistralai/client-python

extra:
  recipe-maintainers:
    - jtpio
